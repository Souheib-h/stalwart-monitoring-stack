global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'stalwart'
    metrics_path: '/metrics/prometheus'
    static_configs:
      - targets: ['stalwart:8080']
    metric_relabel_configs:
      - source_labels: [__name__]
        target_label: __name__
        replacement: 'stalwart_${1}'
        regex: '(.*)'
